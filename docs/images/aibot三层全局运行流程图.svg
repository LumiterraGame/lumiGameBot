<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <style>
      .title { font: 700 28px "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 18px "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #1F2937; }
      .label { font: 600 16px "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .small { font: 500 13px "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #374151; }
      .tiny { font: 500 12px "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #4B5563; }
      .bandText { font: 700 20px "PingFang SC", "Helvetica Neue", Arial, sans-serif; fill: #111827; }
      .box { stroke: #334155; stroke-width: 1.5; rx: 14; ry: 14; }
      .line { stroke: #4B5563; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#F8FAFC"/>

  <text x="800" y="48" text-anchor="middle" class="title">AIBot 三层全局运行流程图</text>
  <text x="800" y="76" text-anchor="middle" class="small">AI 决策层决定路线，Bot 编排层分为 AI决策编排 与 场景执行编排，原子操作层执行最小动作；每个 bot 独立运行</text>

  <rect x="50" y="105" width="1500" height="88" rx="18" fill="#E0F2FE" stroke="#7DD3FC"/>
  <text x="80" y="138" class="bandText">输入环境</text>
  <text x="80" y="164" class="small">角色状态、装备、背包、场景状态、任务进度、商城价格、奖池、授权状态、静态配置</text>

  <rect x="50" y="220" width="1500" height="222" rx="20" fill="#F3E8FF" stroke="#C084FC"/>
  <text x="80" y="252" class="bandText">第一层：AI 决策层</text>

  <rect x="90" y="290" width="205" height="100" class="box" fill="#FFFFFF"/>
  <text x="193" y="322" text-anchor="middle" class="label">State Layer</text>
  <text x="193" y="346" text-anchor="middle" class="tiny">汇总可用于决策的状态输入</text>
  <text x="193" y="365" text-anchor="middle" class="tiny">代码/聚合主导</text>

  <rect x="330" y="290" width="205" height="100" class="box" fill="#FFFFFF"/>
  <text x="432" y="322" text-anchor="middle" class="label">Opportunity Miner</text>
  <text x="432" y="346" text-anchor="middle" class="tiny">生成候选赚钱路线</text>
  <text x="432" y="365" text-anchor="middle" class="tiny">规则主导</text>

  <rect x="570" y="290" width="205" height="100" class="box" fill="#FFFFFF"/>
  <text x="672" y="322" text-anchor="middle" class="label">Policy Engine</text>
  <text x="672" y="346" text-anchor="middle" class="tiny">过滤、评分、候选收缩</text>
  <text x="672" y="365" text-anchor="middle" class="tiny">代码主导</text>

  <rect x="810" y="290" width="205" height="100" class="box" fill="#FFFFFF"/>
  <text x="912" y="322" text-anchor="middle" class="label">AI Advisor</text>
  <text x="912" y="346" text-anchor="middle" class="tiny">候选集中的最终选择</text>
  <text x="912" y="365" text-anchor="middle" class="tiny">LLM/Agent 主使用位</text>

  <rect x="1050" y="290" width="205" height="100" class="box" fill="#FFFFFF"/>
  <text x="1152" y="322" text-anchor="middle" class="label">Execution Planner</text>
  <text x="1152" y="346" text-anchor="middle" class="tiny">把高层机会转成 step plan</text>
  <text x="1152" y="365" text-anchor="middle" class="tiny">模板主导，可选 LLM 辅助</text>

  <rect x="1290" y="290" width="205" height="100" class="box" fill="#FFFFFF"/>
  <text x="1392" y="322" text-anchor="middle" class="label">Safety Guard</text>
  <text x="1392" y="346" text-anchor="middle" class="tiny">做最终资格与风险校验</text>
  <text x="1392" y="365" text-anchor="middle" class="tiny">代码/规则主导</text>

  <line x1="295" y1="340" x2="330" y2="340" class="line"/>
  <line x1="535" y1="340" x2="570" y2="340" class="line"/>
  <line x1="775" y1="340" x2="810" y2="340" class="line"/>
  <line x1="1015" y1="340" x2="1050" y2="340" class="line"/>
  <line x1="1255" y1="340" x2="1290" y2="340" class="line"/>

  <text x="800" y="420" text-anchor="middle" class="small">输出：top_opportunity / ranked_opportunities / why_chosen / expected_profit / fallback_plan / step_plan</text>
  <text x="800" y="440" text-anchor="middle" class="tiny">相同外部环境下，不同 bot 会因 bot_identity_state、偏好和反重复记忆而出现差异化选择</text>

  <rect x="50" y="470" width="1500" height="220" rx="20" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="80" y="502" class="bandText">第二层：Bot 编排层</text>

  <rect x="100" y="535" width="300" height="110" class="box" fill="#FFFFFF"/>
  <text x="250" y="567" text-anchor="middle" class="label">AI决策编排（web）</text>
  <text x="250" y="591" text-anchor="middle" class="tiny">位于 web / service 侧，负责高层 step plan 组织</text>
  <text x="250" y="610" text-anchor="middle" class="tiny">以及区域级 / 副本级 / loop级目标规划</text>

  <rect x="445" y="535" width="300" height="110" class="box" fill="#FFFFFF"/>
  <text x="595" y="567" text-anchor="middle" class="label">场景执行编排（unity）</text>
  <text x="595" y="591" text-anchor="middle" class="tiny">位于 unity 侧，负责九宫格视野下的场景内执行落地</text>
  <text x="595" y="610" text-anchor="middle" class="tiny">以及局部搜索、局部移动、巡逻换点与本地恢复</text>

  <rect x="790" y="535" width="180" height="110" class="box" fill="#FFFFFF"/>
  <text x="880" y="567" text-anchor="middle" class="label">AIBot Panel</text>
  <text x="880" y="591" text-anchor="middle" class="tiny">位于 unity 侧，负责展示状态、决策、日志与接管入口</text>

  <rect x="1005" y="535" width="180" height="110" class="box" fill="#FFFFFF"/>
  <text x="1095" y="567" text-anchor="middle" class="label">Bot Runtime</text>
  <text x="1095" y="591" text-anchor="middle" class="tiny">维护主循环与运行状态</text>

  <rect x="1220" y="535" width="250" height="110" class="box" fill="#FFFFFF"/>
  <text x="1345" y="567" text-anchor="middle" class="label">State Collector / Action Executor</text>
  <text x="1345" y="591" text-anchor="middle" class="tiny">补齐上下文并把步骤拆成原子序列</text>

  <line x1="400" y1="590" x2="445" y2="590" class="line"/>
  <line x1="745" y1="590" x2="790" y2="590" class="line"/>
  <line x1="970" y1="590" x2="1005" y2="590" class="line"/>
  <line x1="1185" y1="590" x2="1220" y2="590" class="line"/>

  <text x="800" y="672" text-anchor="middle" class="small">Bot 编排层分成两个子层：web 负责高层步骤规划，unity 负责场景内执行编排；它不负责跨 bot 统一派工</text>

  <rect x="50" y="710" width="1500" height="170" rx="20" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="80" y="742" class="bandText">第三层：原子操作层</text>

  <rect x="100" y="780" width="180" height="60" class="box" fill="#FFFFFF"/>
  <text x="190" y="816" text-anchor="middle" class="label">Move / Travel / Respawn</text>

  <rect x="315" y="780" width="180" height="60" class="box" fill="#FFFFFF"/>
  <text x="405" y="816" text-anchor="middle" class="label">Acquire / Combat</text>

  <rect x="530" y="780" width="180" height="60" class="box" fill="#FFFFFF"/>
  <text x="620" y="816" text-anchor="middle" class="label">Gather / Plant / Husbandry</text>

  <rect x="745" y="780" width="180" height="60" class="box" fill="#FFFFFF"/>
  <text x="835" y="816" text-anchor="middle" class="label">Task / TokenTask</text>

  <rect x="960" y="780" width="180" height="60" class="box" fill="#FFFFFF"/>
  <text x="1050" y="816" text-anchor="middle" class="label">Equipment / Energy / Items</text>

  <rect x="1175" y="780" width="240" height="60" class="box" fill="#FFFFFF"/>
  <text x="1295" y="816" text-anchor="middle" class="label">Stake / Fishing / Dungeon / Dialogue / Talent</text>

  <text x="800" y="864" text-anchor="middle" class="small">原子层只做最小动作，不负责高层收益路线选择</text>

  <rect x="50" y="900" width="1500" height="48" rx="16" fill="#E5E7EB" stroke="#CBD5E1"/>
  <text x="800" y="930" text-anchor="middle" class="subtitle">执行结果回流：成功 / 失败 / 中断 / 收益变化 -> Telemetry / Profit Attribution -> 反哺下一轮 AI 决策</text>

  <line x1="800" y1="193" x2="800" y2="220" class="line"/>
  <line x1="800" y1="442" x2="800" y2="470" class="line"/>
  <line x1="800" y1="690" x2="800" y2="710" class="line"/>
  <path d="M1450 930 C1525 930, 1525 145, 1450 145 L155 145" class="line dashed"/>
  <text x="1500" y="532" text-anchor="middle" transform="rotate(-90 1500 532)" class="small">结果与日志回流到下一轮决策</text>
</svg>
